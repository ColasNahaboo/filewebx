server {
    listen 443 ssl;
    server_name filewebx.mysite.com;

    root /www/filewebx/data;
    index index.html;

    # Security Header
    add_header Referrer-Policy "no-referrer" always;

    # IP-based Redirect Logic
    # Checks if IP is 88.181.8.140 or 32.166.24.45
    set $admin_ip "";
    if ($remote_addr = "88.181.8.140") { set $admin_ip "yes"; }
    if ($remote_addr = "32.166.24.45") { set $admin_ip "yes"; }

    location ~ ^/(|cgi/|cgi/ul)$ {
        if ($admin_ip = "yes") {
            return 301 /cgi/aiV6shujahla4ei;
        }
        # Fallback if not admin IP
        try_files $uri $uri/ =404;
    }

    # CGI Execution (Requires fcgiwrap)
    location /cgi {
        alias /www/filewebx/cgi;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_pass unix:/var/run/fcgiwrap.socket;
    }

    error_log /var/log/nginx/filewebx_error.log;
    access_log /var/log/nginx/filewebx_access.log;
}
