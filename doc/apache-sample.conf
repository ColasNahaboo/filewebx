<VirtualHost *:443>
    ServerName filewebx.mysite.com
    DocumentRoot /www/filewebx/data
    <Location />
        Options -Indexes +FollowSymLinks
        Require all granted
        AllowOverride None
    </Location>

    # code
    ScriptAlias /cgi /www/filewebx/cgi
    <Directory "/www/filewebx/cgi">
        AllowOverride None
        Options +ExecCGI -Indexes +FollowSymLinks
        SetHandler cgi-script
        Require all granted
    </Directory>

    # files
    <Directory "/www/filewebx/data">
        AllowOverride None
        Options +ExecCGI -Indexes +FollowSymLinks
        Require all granted
        # force files to be downloaded as files, without any interpretation
        SetHandler none
        Header set Content-Disposition "attachment"
        Header set X-Content-Type-Options "nosniff"
        ForceType application/octet-stream
    </Directory>

    # Important security for Capability URLs. Needs apache2 headers mod
    Header always set Referrer-Policy "no-referrer"
    RewriteEngine On

    # Admin IPs allowed to use the base url https://filewex.mysite.com
    # Redirects /, /cgi/, /cgi/ul to the filewebx admin id: aiV6shujahla4ei
    # here for example 88.181.8.140 or 32.166.24.45,
    # Uncomment and replace by yours
    # RewriteCond %{REMOTE_ADDR} ^88\.181\.8\.140$ [OR]
    # RewriteCond %{REMOTE_ADDR} ^32\.166\.24\.45$
    # RewriteRule ^(/|/cgi/|/cgi/ul)$ /cgi/aiV6shujahla4ei [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/filewebx_error.log
    CustomLog ${APACHE_LOG_DIR}/filewebx_access.log combined
</VirtualHost>
