filewebx.mysite.com {
    root * /www/filewebx/data
    file_server

    # Security Header
    header Referrer-Policy "no-referrer"

    # IP-based Redirects
    @admin_ips {
        remote_ip 88.181.8.140 32.166.24.45
        path / /cgi /cgi/ /cgi/ul
    }
    redir @admin_ips /cgi/aiV6shujahla4ei 301

    # CGI Handling (Assuming caddy-cgi plugin)
    route /cgi/* {
        cgi /www/filewebx/cgi/*
    }

    log {
        output file /var/log/caddy/filewebx_access.log
    }
}
